<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | ミラクル・ユニバーシティ</title>
  <link rel="stylesheet" href="style.css">
  <script src="stars.js" defer></script>
</head>
<body>
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .login-star { font-size: 2.5rem; margin-bottom: 16px; display: block; }
</style>

<div class="login-wrap">
  <div class="login-card fade-in">
    <span class="login-star">🌌</span>
    <div class="login-logo">ミラクル・ユニバーシティ</div>
    <h2 style="margin-bottom:8px;font-size:1.6rem;">メンバーログイン</h2>
    <p style="font-size:0.9rem;margin:0 auto 32px;max-width:none;">宇宙があなたを待っています。</p>

    <div class="card">
      <form id="login-form">
        <div class="form-group" style="text-align:left;">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="text-align:left;">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <div id="login-msg"></div>
        <button type="submit" class="btn btn-gold" style="width:100%;margin-top:8px;">ログイン →</button>
      </form>
      <div class="divider">or</div>
      <p style="font-size:0.85rem;max-width:none;color:var(--text-dim);">
        <a href="#">パスワードをお忘れの方</a>
      </p>
    </div>

    <p style="font-size:0.85rem;margin-top:20px;color:var(--text-dim);">
      まだメンバーではない方は <a href="index.html#pricing">こちらから申し込む</a>
    </p>
    <div class="ornament" style="margin-top:32px;">✦ · · · ✦ · · · ✦</div>
    <p style="font-size:0.78rem;color:var(--text-dim);margin-top:8px;">
      デモ用: member@test.com / miracle2026
    </p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  initStars(180);

  // If already logged in, redirect
  if (sessionStorage.getItem('mu_logged_in') === 'true') {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('login-msg');

    // Demo credentials
    if (email === 'member@test.com' && password === 'miracle2026') {
      sessionStorage.setItem('mu_logged_in', 'true');
      sessionStorage.setItem('mu_user_email', email);
      msg.innerHTML = '<div class="msg msg-success">✦ ログイン成功！ダッシュボードへ移動します...</div>';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } else if (email === 'admin@miracle.com' && password === 'miracleadmin2026') {
      window.location.href = 'admin.html';
    } else {
      msg.innerHTML = '<div class="msg msg-error">メールアドレスまたはパスワードが違います。</div>';
    }
  });
});
</script>
</body>
</html>
