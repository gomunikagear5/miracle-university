<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miracle University - ダッシュボード</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; background: linear-gradient(to bottom, #1e3c72, #2a5298); color: white; padding: 20px; }
    #universe-bank { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; text-align: center; }
    #bank-balance { font-size: 48px; font-weight: bold; }
    #pull-to-refresh { background: gold; color: black; padding: 10px; border-radius: 5px; cursor: pointer; }
    #infinite-scroll { height: 300px; overflow-y: scroll; }
    #notifications { position: fixed; top: 10px; right: 10px; background: red; color: white; padding: 10px; display: none; }
    .week-button { background: purple; color: white; padding: 10px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
    .reward { animation: spin 1s; color: gold; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Miracle University ダッシュボード</h1>
  
  <div id="universe-bank">
    <h2>🌌 UNIVERSE BANK</h2>
    <div id="bank-balance">12,450 ビジョン化</div>
    <div id="pull-to-refresh" onclick="pullReward()">プルしてリフレッシュ - 変動報酬を獲得！</div>
    <div id="recent-transactions"></div>
  </div>
  
  <h2>今月のテーマ: お金はエネルギー</h2>
  <p>今月は「お金はエネルギー」をテーマに学びます。宿題を完了してUniverse Bankにデポジット！</p>
  
  <h2>ウィークリー課題</h2>
  <div id="week-buttons">
    <button class="week-button" onclick="completeWeek(1)">Week 1: エネルギー理解</button>
    <button class="week-button" onclick="completeWeek(2)">Week 2: マネーフロー</button>
    <button class="week-button" onclick="completeWeek(3)">Week 3: ビジョン化</button>
    <button class="week-button" onclick="completeWeek(4)">Week 4: 統合</button>
  </div>
  
  <h2>無限スクロールフィード - ランダムインスピレーション</h2>
  <div id="infinite-scroll" onscroll="checkScroll()"></div>
  
  <div id="notifications">新しい報酬が利用可能！チェックして！</div>
  
  <h2>リーダーボード</h2>
  <ul id="leaderboard"></ul>
  
  <script>
    let bankBalance = parseInt(localStorage.getItem('bankBalance')) || 12450;
    let streak = parseInt(localStorage.getItem('streak')) || 7;
    let notificationsEnabled = true;
    
    function updateBank() {
      document.getElementById('bank-balance').textContent = bankBalance.toLocaleString() + ' ビジョン化';
      localStorage.setItem('bankBalance', bankBalance);
    }
    
    function pullReward() {
      const rewards = [0, 100, 500, 1000, -200]; // 変動報酬: 勝ち/負け/ゼロ
      const reward = rewards[Math.floor(Math.random() * rewards.length)];
      bankBalance += reward;
      updateBank();
      const trans = document.createElement('span');
      trans.textContent = (reward > 0 ? '+' : '') + reward + ' プル報酬';
      trans.classList.add('reward');
      document.getElementById('recent-transactions').prepend(trans);
      if (reward > 0) streak++; else streak = 0;
      localStorage.setItem('streak', streak);
      showNotification('プル報酬: ' + reward + ' ビジョン化！');
    }
    
    function completeWeek(week) {
      bankBalance += 1200;
      updateBank();
      alert('Week ' + week + ' 完了！ +1200 ビジョン化');
    }
    
    function checkScroll() {
      const scroll = document.getElementById('infinite-scroll');
      if (scroll.scrollTop + scroll.clientHeight >= scroll.scrollHeight - 20) {
        addRandomContent();
      }
    }
    
    function addRandomContent() {
      const contents = ['新しいインスピレーション: お金は流れるエネルギー', 'ランダム報酬: +50 ビジョン化', 'モチベーション引用: "ビジョンは現実を創る"', '紛争チェック: -100 ビジョン化'];
      const item = document.createElement('div');
      item.textContent = contents[Math.floor(Math.random() * contents.length)];
      document.getElementById('infinite-scroll').appendChild(item);
      if (Math.random() < 0.2) { // 間欠報酬
        bankBalance += 100;
        updateBank();
        showNotification('スクロール報酬: +100 ビジョン化！');
      }
    }
    
    function showNotification(msg) {
      if (notificationsEnabled) {
        const notif = document.getElementById('notifications');
        notif.textContent = msg;
        notif.style.display = 'block';
        setTimeout(() => notif.style.display = 'none', 5000);
      }
    }
    
    // 初期ロード
    updateBank();
    for (let i = 0; i < 10; i++) addRandomContent();
    
    // PWAサービスワーカー
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
    
    // プッシュ通知 (オプション)
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') notificationsEnabled = true;
    });
  </script>
</body>
</html>
