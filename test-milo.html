<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milo Test Page - The exact character from the book cover</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #1a1433 0%, #0a0a1a 70%);
      overflow: hidden;
      position: relative;
      font-family: system-ui, sans-serif;
      color: #f0c040;
    }
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 1;
      pointer-events: none;
    }
    #milo {
      position: fixed;
      z-index: 10;
      width: 180px;
      height: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      object-fit: cover;
      object-position: center 20%; /* Crop to focus on the character, not the text */
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(255,240,100,0.6);
    }
    @keyframes miloFly {
      0% { transform: translateX(-200px) translateY(0px) rotate(-12deg); }
      25% { transform: translateX(25vw) translateY(-40px) rotate(8deg); }
      50% { transform: translateX(55vw) translateY(30px) rotate(-8deg); }
      75% { transform: translateX(80vw) translateY(-25px) rotate(10deg); }
      100% { transform: translateX(125vw) translateY(15px) rotate(-5deg); }
    }
    #milo.flying {
      animation: miloFly 8.5s linear forwards;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div style="position:fixed; top:20px; left:20px; color:#f0c040; font-size:18px; z-index:100; text-shadow:0 0 10px #f0c040;">Milo Test Page — Exact character from the book cover (cropped and animated). Press 'M' or click the button.</div>
  
  <button onclick="flyMilo()" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;background:#f0c040;color:#111;padding:14px 32px;border:none;border-radius:9999px;font-size:16px;cursor:pointer;box-shadow:0 8px 25px rgba(240,192,64,0.6);font-weight:700;">🐦 Click to Make Milo Fly (or press M)</button>
  
  <img id="milo" src="milo.jpg" alt="Milo">
  
  <script>
    // Create stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 250; i++) {
      const star = document.createElement('div');
      const size = Math.random() * 2.5 + 0.8;
      star.style.cssText = `
        position: absolute;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        background: white;
        border-radius: 50%;
        opacity: ${Math.random() * 0.8 + 0.3};
        animation: twinkle ${Math.random() * 4 + 2.5}s infinite;
        box-shadow: 0 0 ${size * 1.5}px #c39bd3;
      `;
      starsContainer.appendChild(star);
    }
    const style = document.createElement('style');
    style.textContent = `@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }`;
    document.head.appendChild(style);
    
    const milo = document.getElementById('milo');
    
    function flyMilo() {
      const startBottom = 15 + Math.random() * 60;
      const duration = 6 + Math.random() * 7;
      milo.style.bottom = startBottom + '%';
      milo.style.left = '-200px';
      milo.style.opacity = '0';
      void milo.offsetWidth;
      milo.style.transition = 'opacity 0.4s ease';
      milo.style.opacity = '1';
      milo.classList.add('flying');
      setTimeout(() => {
        milo.classList.remove('flying');
        milo.style.opacity = '0';
        milo.style.left = '-200px';
      }, duration * 1000);
      console.log('%cMilo flying! (exact character from the book cover, cropped to focus on the character, random path, pure animation)', 'color:#f0c040;font-size:14px');
    }
    
    // 'M' key
    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'm') flyMilo();
    });
    
    // Auto trigger
    setInterval(() => {
      if (Math.random() > 0.3) flyMilo();
    }, 12000);
    
    // Initial
    setTimeout(flyMilo, 800);
    
    console.log('%cTest page ready. The image is the exact book cover character (cropped with object-position to focus on Milo, not the text). Click the button or press M to make him fly with random path. No CSP issues.', 'color:#f0c040;font-size:14px');
  </script>
</body>
</html>
